<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Classifier</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <nav>
            <ul id="header-list">
                <li><h1 href="index.html" id="header-title">Emotion Classifier</h1></li>
                <li></li>

                <li><a href="" title="Notebook (WIP)">
                    <img src="images/colab.png" alt="Notebook" class="icon"></img>
                </a></li>
                <li><a href="https://github.com/susamogus154/emotion-classification-api">
                    <img src="images/github.svg" alt="GitHub" class="icon"></img>
                </a></li>
                <li><a href="#how-it-works">How it works (WIP)</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-container">
        <div class="left-column">
            <div class="control-section">
                <h3>Upload Audio</h3>
                <div class="input-group">
                    <input type="file" id="file-input" accept="audio/*">
                    <button id="submit-audio-button" onclick="uploadFile()">Get emotion</button>
                </div>
            </div>

            <h3>OR</h3>

            <div class="control-section">
                <h3>Record Audio</h3>
                <div class="recording-control">
                    <button id="recording-button" onclick="toggleRecording()">Start Recording</button>
                    <div id="timer" class="timer">00:00</div>
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="control-section" id="results-box">
                <div class="results-container">
                    <div class="result-main">
                        <div class="result-center">
                            <div id="biggest-percentage" class="emotion-main">--%</div>
                            <div id="main-emotion" class="emotion-label">---</div>
                        </div>
                    </div>
                    <div class="result-minor">
                        <h3 class="visually-hidden">Other emotions</h3>
                        <ul id="minor-emotions" class="emotion-list"></ul>
                    </div>
                </div>
            </div>

            <div class="control-section" id="chart-box">
                <canvas id="radar-chart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="script.js"></script>

    <h2 id="how-it-works">How it works</h2>
    <p>WIP</p>
</body>
</html>
