<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Classifier</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <nav>
            <ul id="header-list">
                <li><h1 href="index.html" id="header-title">Emotion Classifier</h1></li>
                <li></li>

                <li><a href="" title="Notebook (WIP)">
                    <img src="images/colab.png" alt="Notebook" class="icon"></img>
                </a></li>
                <li><a href="https://github.com/susamogus154/emotion-classification-api">
                    <img src="images/github.svg" alt="GitHub" class="icon"></img>
                </a></li>
                <li><a href="#how-it-works">How it works (WIP)</a></li>
            </ul>
        </nav>
    </header>

    <div>
        <button id="retrieve-labels-button" onclick="getLabels()">Retrieve emotion labels</button>
    </div>
    
    <div>
        <input type="file" id="file-input" accept="audio/*">
    </div>
    
    <div>
        <button id="submit-audio-button" onclick="uploadFile()">Get emotion</button>
    </div>

    <button onclick="startRecording()">Start Recording</button>
    <button onclick="stopRecording()">Stop & Analyze</button>

    <div id="output">
        <div id="raw-output"></div>
        <div id="biggest-percentage">--%</div>
        <div id="main-emotion">---</div>
    </div>
    <canvas id="radar-chart"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="script.js"></script>






    <h2 id="how-it-works">How it works</h2>
    <p>WIP</p>
</body>
</html>
